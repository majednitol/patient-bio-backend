    <!-- Critical CSS variables inlined for instant first paint -->
    <style>
      :root {
        --background: 0 0% 100%;
        --foreground: 240 10% 4%;
        --primary: 262 83% 58%;
        --muted-foreground: 240 4% 46%;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --background: 240 10% 4%;
          --foreground: 0 0% 98%;
          --primary: 262 83% 58%;
          --muted-foreground: 240 5% 65%;
        }
      }
    </style>
    <div id="root">
      <!-- Inline loading skeleton for faster FCP -->
      <style>
        .loading-skeleton {
          display: flex;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          background: #0f0a1a;
          flex-direction: column;
          font-family: system-ui, -apple-system, sans-serif;
        }
        .loading-skeleton .spinner {
          width: 40px;
          height: 40px;
          border: 3px solid rgba(124, 58, 237, 0.2);
          border-top-color: #7c3aed;
          border-radius: 50%;
          animation: spin 0.8s linear infinite;
        }
        .loading-skeleton p {
          color: rgba(255,255,255,0.6);
          margin-top: 16px;
          font-size: 14px;
        }
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
      </style>
      <div class="loading-skeleton">
        <div class="spinner"></div>
